window:
  opacity: 1
  dimensions:
    columns: 200
    lines: 80

env:
  TERM: xterm-256color

font:
  # Normal (roman) font face
  normal:
    # family: Iosevka Extralight
    # family: Fira Code
    # family: Iosevka Nerd Font
    # family: Noto Sans Mono Light
    # family: FuraCode Nerd Font
    # family: FuraCode Nerd Font
    family: FiraCode Nerd Font
    # family: CascadiaCode Nerd Font
    # family: FantasqueSansMono Nerd Font Mono
    # family: VictorMono Nerd Font
    # family: Anonymice Nerd Font
    # family: Iosevka Nerd Font
    # family: SauceCodePro Nerd Font
    # The `style` can be specified to pick a specific face.
    # style: Light
    style: Regular

  size: 14

key_bindings:
  - { key: N, mods: Command, action: CreateNewWindow }

colors:
  name: Google (dark)
  author: Chris Kempson
  primary:
    background: "#1d1f21"
    foreground: "#c5c8c6"
  cursor:
    text: "#1d1f21"
    cursor: "#c5c8c6"
  normal:
    black: "#1d1f21"
    red: "#cc342b"
    green: "#198844"
    yellow: "#fba922"
    blue: "#3971ed"
    magenta: "#a36ac7"
    cyan: "#3971ed"
    white: "#c5c8c6"
  bright:
    black: "#969896"
    red: "#cc342b"
    green: "#198844"
    yellow: "#fba922"
    blue: "#3971ed"
    magenta: "#a36ac7"
    cyan: "#3971ed"
    white: "#ffffff"
theme: Google.dark
